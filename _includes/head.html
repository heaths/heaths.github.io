<head>
  <script>/* Restore saved theme before CSS renders to prevent a flash. */
(function(){try{var t=localStorage.getItem('theme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);}catch(_){}})();</script>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  {%- seo -%}
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}" />
  <script defer src="{{ '/assets/scripts/theme-toggle.js' | relative_url }}"></script>
  {%- feed_meta -%} {%- if jekyll.environment == 'production' and
  site.google_analytics -%} {%- include google-analytics.html -%} {%- endif -%}
  {%- if page.atUri %}
  <link rel="site.standard.document" href="{{ page.atUri }}" />
  {%- endif %}
</head>
